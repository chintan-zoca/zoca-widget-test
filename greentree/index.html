<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Zoca Widget Test</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #fafaf7;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #ffffff;
    border: 1px solid #e7e4dc;
    border-radius: 12px;
    padding: 40px 48px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.04);
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  h1 { font-size: 24px; font-weight: 600; margin: 0 0 8px; letter-spacing: -0.01em; }
  p { color: #6b6b6b; font-size: 15px; line-height: 1.5; margin: 0 0 28px; }
  .book-now {
    background: #0f766e; color: white; border: none; border-radius: 8px;
    padding: 14px 28px; font-size: 15px; font-weight: 600; cursor: pointer;
    transition: background 0.15s; font-family: inherit;
  }
  .book-now:hover { background: #0d5d56; }
  .meta {
    margin-top: 24px; padding-top: 20px; border-top: 1px solid #f0ede5;
    font-size: 12px; color: #9a9a9a; font-family: "SF Mono", Menlo, monospace;
    word-break: break-all; text-align: left;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Book an appointment</h1>
    <p>Click below to launch the Zoca booking widget.</p>
    <button id="zoca-book" class="book-now">Book Now</button>
    <div class="meta">
      entity: 0a072216-613f-48bc-8cca-37da0f8b8699<br>
      api: https://api.zoca.ai<br>
      script: zoca-mindbody.zoca.com/scheduler.min.js (production)
    </div>
  </div>

  <script src="https://zoca-mindbody.zoca.com/scheduler.min.js"
    data-entity-id="0a072216-613f-48bc-8cca-37da0f8b8699"
    data-api-base="https://api.zoca.ai"
    data-attach-to="#zoca-book"
    async></script>
</body>
</html>
